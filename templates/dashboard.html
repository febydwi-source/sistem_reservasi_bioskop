{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">

    <h2>Dashboard Reservasi</h2>

    <a href="/tambah/" class="btn btn-primary">
        Tambah Reservasi
    </a>

</div>

<table class="table table-bordered table-striped">

    <tr>
        <th>Nama</th>
        <th>Tanggal</th>
        <th>Waktu</th>
        <th>Jumlah</th>
        <th>Status</th>
        <th>Aksi</th>
    </tr>

    {% for d in data %}

    <tr>
        <td>{{ d.nama }}</td>
        <td>{{ d.tanggal }}</td>
        <td>{{ d.waktu }}</td>
        <td>{{ d.jumlah_orang }}</td>
        <td>{{ d.status }}</td>

        <td>
            <a href="/hapus/{{ d.id }}/"
               class="btn btn-danger btn-sm">
                Hapus
            </a>
        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
