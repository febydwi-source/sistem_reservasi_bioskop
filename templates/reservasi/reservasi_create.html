{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow border-0">

            <div class="card-header bg-primary text-white">

                <h3 class="mb-0">

                    🎟️ Pesan Tiket Bioskop

                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label fw-bold">

                            Jadwal Tayang

                        </label>

                        {{ form.jadwal }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">

                            Kursi

                        </label>

                        {{ form.kursi }}

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">

                            Jumlah Tiket

                        </label>

                        {{ form.jumlah_tiket }}

                    </div>

                    <hr>

                    <button
                        type="submit"
                        class="btn btn-success w-100">

                        <i class="bi bi-ticket-fill"></i>
                        Pesan Sekarang

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
